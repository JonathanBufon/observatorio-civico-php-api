services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - app_vendor:/var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
    networks:
      - observatorio

  db:
    image: postgres:16-alpine
    ports:
      - "${DB_FORWARD_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_DATABASE:-observatorio_civico}"
      POSTGRES_USER: "${DB_USERNAME:-observatorio}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-observatorio_dev}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME:-observatorio}", "-d", "${DB_DATABASE:-observatorio_civico}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - observatorio

networks:
  observatorio:
    driver: bridge

volumes:
  app_vendor:
  pgdata:
